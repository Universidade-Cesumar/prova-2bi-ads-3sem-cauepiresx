<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Almoxarifado - Enfermagem</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <header>

        <h1>Controle Inteligente de Almoxarifado</h1>

        <p>
            Sistema de gerenciamento de materiais para aulas práticas de Enfermagem
        </p>

    </header>

    <main class="container">

        <section class="painel">

            <div class="card-info">

                <h3>Total de Materiais</h3>

                <span id="total-materiais">
                    0
                </span>

            </div>

            <div class="card-info">

                <h3>Total em Estoque</h3>

                <span id="total-estoque">
                    0
                </span>

            </div>

        </section>

        <section class="card">

            <h2>Cadastrar Material</h2>

            <div id="mensagem"></div>

            <label>Nome do Material</label>

            <input
                type="text"
                id="input-nome"
                placeholder="Ex: Luva de Procedimento">

            <label>Quantidade</label>

            <input
                type="number"
                id="input-quantidade"
                placeholder="Ex: 100">

            <button id="btn-cadastrar">
                Cadastrar Material
            </button>

        </section>

        <section class="card">

            <h2>Materiais Cadastrados</h2>

            <table>

                <thead>

                    <tr>
                        <th>ID</th>
                        <th>Material</th>
                        <th>Quantidade</th>
                    </tr>

                </thead>

                <tbody id="lista-materiais">

                </tbody>

            </table>

        </section>

    </main>

    <footer>

        Sistema desenvolvido para o controle do almoxarifado de Enfermagem

    </footer>

    <script src="js/script.js"></script>

</body>

</html>
